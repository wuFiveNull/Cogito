# CI order is fixed by design (Plan 01 M6):
#   dependency rules -> contract -> unit -> integration -> recovery
# Architecture tests must NOT be masked by xfail — new violations fail CI.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  architecture:
    name: "1. Architecture (dependency + boundaries)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      # Forbidden-import + cycle + facade tests run FIRST, before any unit test.
      # These must pass before later jobs run. No xfail allowed.
      - name: Dependency + boundary + facade + contract tests
        run: >
          python -m pytest tests/architecture/ -v
          --strict-markers
          -p no:xfail

  quality:
    name: "2. Quality gates (Ruff + compileall)"
    runs-on: ubuntu-latest
    needs: architecture
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m ruff check src/ tests/
      - run: python -m compileall -q src/

  test:
    name: "3. Test suite (unit + integration)"
    runs-on: ${{ matrix.os }}
    needs: quality
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      - run: python -m pytest tests/ -q --strict-markers

  recovery:
    name: "4. Recovery + forced-termination smoke"
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e ".[dev]"
      # Recovery tests are identified via marker: @pytest.mark.recovery
      - run: python -m pytest tests/ -q -m recovery --strict-markers

  # ── 5. Web typecheck / unit / build (PLAN-10 M6) ──────────────────
  web:
    name: "5. Web (typecheck + build)"
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  # ── 6. Browser smoke (PLAN-10 M6) ─────────────────────────────────
  # 初始接入阶段不阻塞主干 (continue-on-error)。稳定后移除该标志。
  browser-smoke:
    name: "6. Browser smoke (Playwright)"
    runs-on: ubuntu-latest
    needs: web
    continue-on-error: true
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build web (if not already built)
        run: npm run build
      - name: Run Playwright smoke
        run: npm run test:e2e
