# Dangerous Command Detection Rules
# =========================================================================
# YAML signature rules for RuleEngine.
# Scans shell command parameters for destructive, evasive, or
# privilege-escalating patterns before the agent executes them.
#
# Severity tiers:
#   MEDIUM   — cautionary (typically requires user review)
#   HIGH     — destructive or sensitive (blocks execution)
#   CRITICAL — immediate system threat (always blocks)

# ── rm: file / directory removal ──────────────────────────────────────
- id: TOOL_CMD_DANGEROUS_RM
  tools: [shell]
  params: [command]
  category: command_injection
  severity: HIGH
  patterns:
    - "\\brm\\b"
  exclude_patterns:
    - "^\\s*#"
  description: "Shell command contains 'rm' which may cause data loss"
  remediation: "Confirm with the user before removing files or directories"

# ── mv: file / directory move / rename ────────────────────────────────
- id: TOOL_CMD_DANGEROUS_MV
  tools: [shell]
  params: [command]
  category: command_injection
  severity: HIGH
  patterns:
    - "\\bmv\\b"
  description: "Shell command contains 'mv' which may move or overwrite files unexpectedly"
  remediation: "Confirm with the user before moving or renaming files"

# ── Filesystem & Block Device Destruction ─────────────────────────────
- id: TOOL_CMD_FS_DESTRUCTION
  tools: [shell]
  params: [command]
  category: command_injection
  severity: CRITICAL
  patterns:
    - "\\bmkfs(\\.[a-zA-Z0-9_]+)?\\b"
    - "\\bmke2fs\\b"
    - "\\bdd\\s+.*of=\\/dev\\/"
    - ">\\s*\\/dev\\/(sd[a-z][0-9]*|vd[a-z][0-9]*|nvme\\d+n\\d+(p\\d+)?)"
  description: "Detects low-level disk formatting or wiping commands"
  remediation: "Block operation. Agents should not format or overwrite raw block devices."

# ── Denial of Service & Fork Bombs ────────────────────────────────────
- id: TOOL_CMD_DOS_FORK_BOMB
  tools: [shell]
  params: [command]
  category: resource_abuse
  severity: CRITICAL
  patterns:
    - ":\\s*\\(\\s*\\)\\s*\\{\\s*:\\s*\\|\\s*:\\s*&\\s*\\}\\s*;\\s*:"
    - "\\bkill\\s+-9\\s+(-1\\b|1\\b)"
  description: "Detects classic Bash fork bombs and mass process termination"
  remediation: "Block immediately. These commands will crash the host system."

# ── Network Loaders (Pipe to Shell) ───────────────────────────────────
- id: TOOL_CMD_PIPE_TO_SHELL
  tools: [shell]
  params: [command]
  category: code_execution
  severity: CRITICAL
  patterns:
    - "\\b(curl|wget)\\b\\s+.*\\|.*\\b(bash|sh|zsh|ash|dash)\\b"
  description: "Detects 'curl | bash' patterns used to download and immediately execute remote payloads"
  remediation: "Confirm with user. Agents should inspect scripts before executing them."

# ── Reverse Shell & Network Tunnels ───────────────────────────────────
- id: TOOL_CMD_REVERSE_SHELL
  tools: [shell]
  params: [command]
  category: network_abuse
  severity: CRITICAL
  patterns:
    - "\\/dev\\/(tcp|udp)\\/"
    - "\\bnc\\s+.*-e\\s*\\S+"
    - "\\bncat\\s+.*-e\\s*\\S+"
    - "\\bsocat\\s+.*EXEC:"
  description: "Detects attempts to establish reverse shells or unauthorized network tunnels"
  remediation: "Block operation. Agents do not need to bind interactive shells to network sockets."

# ── System Tampering ──────────────────────────────────────────────────
- id: TOOL_CMD_SYSTEM_TAMPERING
  tools: [shell]
  params: [command]
  category: sensitive_file_access
  severity: HIGH
  patterns:
    - "\\bcrontab\\b"
    - "\\bauthorized_keys\\b"
    - "\\/etc\\/sudoers"
    - "\\/etc\\/crontab"
  description: "Detects access to cron jobs, SSH keys, or sudo permissions"
  remediation: "Confirm with user. Treat any access to credential and scheduling files as sensitive."

# ── Dangerous Permission Changes ──────────────────────────────────────
- id: TOOL_CMD_UNSAFE_PERMISSIONS
  tools: [shell]
  params: [command]
  category: privilege_escalation
  severity: HIGH
  patterns:
    - "\\bchmod\\s+-[a-zA-Z]*R[a-zA-Z]*\\s+(777|a\\+rwx)\\s+\\/"
    - "\\bchattr\\s+\\+i"
  description: "Detects global permission downgrades (chmod 777) or setting immutable flags"
  remediation: "Prompt for confirmation. Suggest least-privilege permission models."

# ── Obfuscated Execution ──────────────────────────────────────────────
- id: TOOL_CMD_OBFUSCATED_EXEC
  tools: [shell]
  params: [command]
  category: code_execution
  severity: HIGH
  patterns:
    - "\\beval\\b"
    - "\\bexec\\b"
    - "\\bsource\\b"
    - "\\b\\.\\s+[\\/\\.]"
  description: "Detects eval, exec, or source commands that execute dynamically generated code"
  remediation: "This pattern is often used to hide malicious payloads. Review carefully."

# ── Suspicious Downloads ──────────────────────────────────────────────
- id: TOOL_CMD_SUSPICIOUS_DOWNLOAD
  tools: [shell]
  params: [command]
  category: network_abuse
  severity: HIGH
  patterns:
    - "\\b(wget|curl)\\b.*-o\\s+\\/(?:tmp|dev\\/shm|var\\/tmp)"
  description: "Detects downloading files to world-writable directories"
  remediation: "Agents should download to the workspace directory, not /tmp or /dev/shm."

# ── Suspicious Base64 Decoding ────────────────────────────────────────
- id: TOOL_CMD_BASE64_DECODE
  tools: [shell]
  params: [command]
  category: code_execution
  severity: HIGH
  patterns:
    - "echo\\s+[A-Za-z0-9+/=]{40,}\\s*\\|\\s*base64\\s*-d"
    - "base64\\s*-d\\s*<<<\\s*['\"]?[A-Za-z0-9+/=]{40,}"
  description: "Detects base64-decoding of long strings, often used to hide payloads"
  remediation: "Base64-encoded payloads should be reviewed before execution."

# ── Python Code Injection ─────────────────────────────────────────────
- id: TOOL_CMD_PYTHON_INJECTION
  tools: [shell]
  params: [command]
  category: code_execution
  severity: HIGH
  patterns:
    - "python\\s+-c\\s+['\"].*(import|exec|eval|compile|__import__)"
    - "python3\\s+-c\\s+['\"].*(import|exec|eval|compile|__import__)"
  description: "Detects inline Python execution with dynamic code"
  remediation: "Review the inline Python code carefully before allowing execution."

# ── IFS Injection ─────────────────────────────────────────────────────
- id: TOOL_CMD_IFS_INJECTION
  tools: [shell]
  params: [command]
  category: command_injection
  severity: HIGH
  patterns:
    - "\\bIFS\\b"
  description: "Detects IFS (Internal Field Separator) manipulation"
  remediation: "IFS manipulation can bypass command parsing. Review carefully."

# ── Environment Variable Injection ────────────────────────────────────
- id: TOOL_CMD_ENV_INJECTION
  tools: [shell]
  params: [command]
  category: command_injection
  severity: MEDIUM
  patterns:
    - "\\$\\(<\\s*file\\)"
    - "\\$\\{<\\s*file\\}"
  description: "Detects shell reading file content into variables"
  remediation: "This can expose sensitive file contents."

# ── Unicode / Control Character Evasion ───────────────────────────────
- id: TOOL_CMD_UNICODE_EVASION
  tools: [shell]
  params: [command]
  category: code_execution
  severity: HIGH
  patterns:
    - "[\\u2000-\\u200F\\u2028-\\u202F\\uFEFF]"
    - "[\\x00-\\x08\\x0B\\x0C\\x0E-\\x1F]"
  description: "Detects Unicode whitespace or control characters that can hide commands"
  remediation: "Stripped non-ASCII whitespace and control characters before execution."

# ── Shutdown / Reboot ─────────────────────────────────────────────────
- id: TOOL_CMD_SHUTDOWN
  tools: [shell]
  params: [command]
  category: resource_abuse
  severity: CRITICAL
  patterns:
    - "\\bshutdown\\b"
    - "\\breboot\\b"
    - "\\bpoweroff\\b"
    - "\\binit\\s+0\\b"
    - "\\binit\\s+6\\b"
  description: "Detects system shutdown or reboot commands"
  remediation: "Block immediately. Agents should not shut down the host system."

# ── Log / Audit Trail Clearing ────────────────────────────────────────
- id: TOOL_CMD_CLEAR_LOGS
  tools: [shell]
  params: [command]
  category: sensitive_file_access
  severity: HIGH
  patterns:
    - "\\brm\\s+.*\\.(log|audit)\\b"
    - "\\bjournalctl\\s+--rotate\\b"
    - "\\bhistory\\s+-c\\b"
    - ">\\s*\\/var\\/log\\/"
  description: "Detects clearing of log files or audit trails"
  remediation: "Agents should not clear system logs. This is suspicious behavior."

# ── Cryptominers / Resource Abuse ─────────────────────────────────────
- id: TOOL_CMD_CRYPTOMINER
  tools: [shell]
  params: [command]
  category: resource_abuse
  severity: CRITICAL
  patterns:
    - "\\b(minerd|xmrig|cpuminer|ccminer|sgminer|ethminer)"
    - "\\bpools?\\.(com|org|io|net)\\b"
  description: "Detects cryptominer executables or pool connections"
  remediation: "Block immediately. Cryptominers consume excessive system resources."
