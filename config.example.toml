# Cogito 配置示例
# 复制本文件为 config.toml 并按需修改
# API Key 直接填写明文，或通过 ${ENV_VAR} 引用环境变量
#
# 配置层级 (CONFIG-PROFILES / 1):
#   built-in defaults → profile file → local override → env override
# 配置校验 (CONFIG-PROFILES / 6):
#   - 所有定型节的未知字段会报错并列出字段名
#   - 启动前路径、Provider、模型和跨字段约束会被检查
# Secret 安全 (CONFIG-PROFILES / 5):
#   - 配置输出（repr、config check、启动日志）不会打印 Secret 原值
#
# 首次验证：
#   Copy-Item config.example.toml config.toml
#   python -m cogito config check
#
# 校验成功输出示例：
#   [ok] config: <绝对路径>
#   [ok] profile: development
#   [ok] workspace: <绝对路径>
#   [ok] model: configured | stub
#   [ok] schema: valid

workspace_path = ".workspace"

[storage]
db_path = "data/cogito.db"
enable_wal = true
busy_timeout = 5000
payload_dir = "data/payload"

[runtime]
profile = "personal"
timezone = "Asia/Shanghai"
instance_id = ""

[interaction]
bind_host = "127.0.0.1"
allow_remote = false
validate_origin = true

[worker]
# Lease/心跳/恢复参数（必满足：lease_duration > heartbeat_interval）
concurrency = 1
poll_interval_seconds = 1.0
lease_duration_seconds = 300
heartbeat_interval_seconds = 60
outbox_lease_ttl_seconds = 120
delivery_lease_ttl_seconds = 120
recovery_grace_period_seconds = 30

# ── Agent 运行模式（可选）──
# [agent]
# max_output_tokens = 4096
# context_memory_window = 50
# mode = "reactive"                    # reactive | proactive | scheduled | maintenance
# system_prompt_mode = "append"        # replace | append
# enabled_toolsets = ["core", "terminal", "memory", "search"]
# disabled_toolsets = []
# system_prompt                    = "额外的系统提示词（append 模式下拼接到默认提示词后）"

# ── 模型配置（必填，除非使用 Stub/Echo Provider）──
# 取消注释并填入你的 Provider：
#
# [model]
# provider = "openai_compat"
#
# [model.main]
# model = "deepseek-chat"
# api_key = "sk-your-real-key"
# base_url = "https://api.deepseek.com/v1"
# timeout_seconds = 60
#
# 也支持环境变量引用：api_key = "${MY_API_KEY}"
#
# ── 多 Provider + 模型类别路由（推荐）──
# 按功能（main/fast/vlm）路由到不同 Provider，无需业务代码感知模型名。
# provider 字段指定适配器：openai_compat / anthropic / echo。
#
# [model.providers.openai]
# provider = "openai_compat"
# api_key = "${OPENAI_API_KEY}"
# base_url = "https://api.aihubmix.com/v1"
# modalities = ["text", "image"]
#
# [model.providers.anthropic]
# provider = "anthropic"
# api_key = "${ANTHROPIC_API_KEY}"
# 默认 base_url = https://api.anthropic.com
#
# [model.roles.main]
# provider = "anthropic"
# model = "claude-sonnet-4-20250514"
#
# [model.roles.fast]
# provider = "openai"
# model = "gpt-4o-mini"
#
# [model.roles.vlm]
# provider = "openai"
# model = "gpt-4o"

# ── Auto Mode（默认关闭）──
# 确定性 ToolPolicy 始终先执行；低风险、无副作用的本地工具走快速路径，
# 其余工具由 fast 角色进行两阶段安全分类，分类不可用时默认阻断。
# [capability.auto_mode]
# enabled = true
# model_role = "fast"
# stage1_timeout_seconds = 10
# stage2_timeout_seconds = 30
# max_argument_chars = 8000
# safe_tools = []

# ── 多模态感知层（默认关闭）──
# [multimodal]
# enabled = true
# auto_analyze = true
# inline_wait_seconds = 5.0
# tool_timeout_seconds = 20.0
# max_file_bytes = 20971520
# max_image_pixels = 40000000
# max_assets_per_message = 4
# allowed_mime_types = ["image/jpeg", "image/png", "image/gif", "image/webp"]
# prompt_version = "1"
# result_schema_version = "1"
#
# 表情包（sticker）功能：save_sticker_from_url 的域名白名单。
# 私有地址（10./192.168./127./169.254. 等）始终被拦截，即使在此白名单中。
# allowed_sticker_hosts = []  # 例：["i.imgur.com", "picsum.photos"]
#
# ── 离线调试：Echo Provider（零 Token 消耗）──
# 将用户最后一条消息原样返回，用于调试 Agent Loop / 工具调用链 / Trace 记录。
# 配置方式：仅设置 provider = "echo"（无需 api_key / base_url）
#
# [model]
# provider = "echo"

# ── 全局 Channel 网关（可选；首个真实 Channel 阶段再启用）──
# [channel]
# gateway_url = "http://127.0.0.1:8080"

# ── Plugin Runtime（默认关闭；第三方默认 subprocess）──
# [capability.plugins]
# enabled = false
# auto_start = false
# builtin_paths = ["plugins"]
# project_paths = [".cogito/plugins"]
# granted_permissions = ["filesystem.read", "network.connect:api.example.com"]

# ── 通用 Agent Tool（显式 Root；未配置时不注册文件 Tool；无 Shell Tool）──
# [capability.workspace]
# root = "D:/Code/PythonCode/cogito"
# protected_paths = [".git", ".env", ".workspace", "config.toml"]
# max_read_bytes = 1000000
# max_write_bytes = 1000000
#
# Mutable user Skills are registered only when this root is explicit.
# [capability.skills]
# root = "D:/Code/PythonCode/cogito/.cogito/skills"
#
# [capability.read_only_mcp]
# principal_id = "owner"
# page_size = 50

# ── MCP Server（可选；stdio 仅允许显式信任的宿主进程）──
# [capability.mcp.servers.docs]
# command = "python"
# args = ["-m", "example_mcp"]
# transport = "stdio" # stdio | sse | streamable_http
# enabled = true
# toolset = "mcp"
# include_tools = []
# exclude_tools = []
# timeout_seconds = 30
# max_output_chars = 50000
# allow_resources = false
# allow_prompts = false
# allow_roots = false
# allow_sampling = false
# isolation = "host_trusted"
# env = { API_TOKEN = "env://EXAMPLE_API_TOKEN" }
# oauth_enabled = false
# oauth_token_file = ".workspace/secrets/docs-mcp-oauth.json"
# oauth_redirect_uri = "http://127.0.0.1:33418/callback"
# oauth_scope = ""
# secret_root = ".workspace/secrets"
# roots = [] # used only when allow_roots=true
# [capability.mcp.servers.docs.tool_policy.search]
# risk_level = "medium"
# approval_policy = "auto"
# permissions = ["network.read"]
#
# [capability.mcp.aliases]
# docs_search = "docs.query_docs"

# ── AIHOT（主动推送信息源；可选）──
# 将 https://aihot.virxact.com 的公开 API 封装为 MCP 工具，
# 暴露 aihot_fingerprint / aihot_items / aihot_daily / aihot_daily_by_date
# / aihot_dailies / aihot_hot_topics / aihot_version / aihot_cache_status 共 8 项工具。
# command 必须使用 cogito conda env 的绝对路径 python（不要用裸 python 或 npx）。
# 查找方法（PowerShell）：conda activate cogiton; (Get-Command python).Source
#
# [capability.mcp.servers.aihot]
# command = "C:/Users/wu/miniconda3/envs/cogito/python.exe"
# args = [".workspace/tools/aihot_server.py"]
# transport = "stdio"
# enabled = true
# toolset = "mcp"
# isolation = "host_trusted" # 本地受信代码才可显式启用

# ── Proactive 主动推送（Plan 06；默认关闭 + dry-run）──
# 启用方法：enabled=true + dry_run=false（首次建议仅 dry-run 观察 would_send）。
# threshold/budget/quiet_hours 都走这里——无需代码改动。
#
# [proactive]
# enabled = false                # 主开关；false=完全不创建 evaluate Task
# dry_run = true                 # 创建 decision 但不创建真实 Delivery
# default_principal_id = "owner"
# minimum_relevance = 0.55
# minimum_novelty = 0.60
# same_topic_cooldown_minutes = 360
# max_pushes_per_hour = 3
# max_pushes_per_day = 10
# alert_max_per_hour = 5
# digest_max_delay_minutes = 360
# candidate_ttl_hours = 48
#
# [proactive.quiet_hours]
# enabled = true
# start = "23:00"
# end = "08:00"
# timezone = "Asia/Shanghai"
#
# [proactive.cadence]
# min_interval_seconds = 60
# max_interval_seconds = 1800
# high_energy_interval_seconds = 480
# medium_energy_interval_seconds = 240
# low_energy_interval_seconds = 60
# jitter_ratio = 0.10
# misfire_policy = "coalesce"

# ── Drift 空闲后台维护（Plan 14 M3-M5；默认关闭 + dry-run）──
# Drift 是 Task mode (drift.run)，不是独立 Agent Loop。
# 复用 tasks/task_attempts 生命周期；默认只读内置 Skill。
#
# [drift]
# enabled = false                # 主开关；false=不创建 drift.run Task
# dry_run = true                 # 仅记录本应选择的 Skill，不创建 run Task
# default_principal_id = "owner"
# idle_after_minutes = 30        # 用户多久无活动才算 idle
# max_runs_per_day = 3
# max_concurrent = 1             # 同时最多 active Drift; partial unique index 也强制
# max_runtime_seconds = 60
# max_steps = 8
# allow_workspace_skills = false
# allow_candidate_emission = false
# allow_candidate_projection = false  # DriftResult→ProactiveCandidate 投影开关 (独立 kill switch)
# workspace_path = ".workspace"  # 启用 workspace Skills 时扫描 drift/skills 子目录
#
# [drift.preemption]
# check_interval_seconds = 1
# turn_priority_threshold = 50
# high_priority_backlog_threshold = 1

# ── Embedding（Phase 4；默认关闭）──
# [embedding]
# enabled = false

# ── QQ OneBot 11 渠道（Plan 03；可选）──
# 需要 pip install -e ".[qq]" 安装 aiocqhttp
# 第一个真实 Channel 开发中，当前标记 experimental。
#
# [channel.qq]
# enabled = true
# driver = "aiocqhttp"
# instance_id = "qq-main"
# host = "127.0.0.1"                  # 第一版仅允许 loopback
# port = 8080
# access_token = "${COGITO_QQ_ACCESS_TOKEN}"
# owner_qq_ids = ["${COGITO_OWNER_QQ}"]
# allow_private = true
# allowed_group_ids = []             # 空 = 拒绝全部群聊
# require_mention_in_group = true
# startup_timeout_seconds = 15
# ── 长期记忆提取与权重维护 ──
[memory.extraction]
enabled = true
min_new_messages = 4
max_window_messages = 50
on_session_close = true
on_explicit_remember = true

[memory.weight]
policy_version = "2"
recompute_interval_seconds = 43200
candidate_ttl_days = 30

# ── 内容记忆（默认关闭，显式开启后才进入 Context）──
[knowledge]
enabled = false
allowed_source_kinds = ["connector", "explicit_local_file"]
max_resource_bytes = 10485760
parser_version = "1"
segmenter_version = "1"

[knowledge.retrieval]
keyword_enabled = true
embedding_enabled = true
top_k = 8
token_budget_ratio = 0.20
