[project]
name = "cogito"
version = "0.1.0"
description = "Cogito — 主动式个人 Agent 框架"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "hunriiz" }]
dependencies = [
    "pydantic>=2.0",
]

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[dependency-groups]
dev = ["pytest>=8", "ruff>=0.11", "pytest-asyncio>=0.24"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
