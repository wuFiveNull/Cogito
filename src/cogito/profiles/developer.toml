workspace_path = ".workspace/developer"

[runtime]
profile = "developer"
timezone = "Asia/Shanghai"

[interaction]
bind_host = "127.0.0.1"
allow_remote = false

[model]
provider = "echo"

[agent]
mode = "reactive"
enabled_toolsets = ["core", "memory", "file", "skills", "schedule", "subagent", "web", "mcp", "knowledge"]
disabled_toolsets = []
streaming_enabled = true

[capability.workspace]
root = "."
protected_paths = [".git", ".env", ".workspace", ".venv", "config.toml"]
max_read_bytes = 1000000
max_write_bytes = 1000000

[capability.skills]
root = ".cogito/skills"

[capability.auto_mode]
enabled = true
model_role = "fast"
stage1_timeout_seconds = 10
stage2_timeout_seconds = 30
max_argument_chars = 8000
safe_tools = ["core:now", "core:echo", "core:tool_search", "core:tool_describe", "core:todo_read"]

[capability.read_only_mcp]
principal_id = "owner"
page_size = 50

[multimodal]
enabled = false

[knowledge]
enabled = true
